name: microtap
description: MicroTAP
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  bloc: ^9.0.0
  flutter_bloc: ^9.0.0
  
  # UI & Theme
  google_fonts: ^8.0.2
  
  # Navigation
  auto_route: ^11.1.0
  
  # Persistence
  drift: ^2.25.1
  drift_flutter: ^0.3.0
  
  # Networking & Serialization
  dio: ^5.8.0+1
  json_annotation: ^4.9.0
  
  # Functional Programming & Utils
  dartz: ^0.10.1
  freezed_annotation: ^3.1.0
  rxdart: ^0.28.0
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
  
  # Code Generation
  build_runner: ^2.4.15
  auto_route_generator: ^10.5.0
  drift_dev: ^2.25.1
  freezed: ^3.2.5
  json_serializable: ^6.9.4
  
  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
